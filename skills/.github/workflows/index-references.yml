# Refreshes edge-esmeralda/references/ every 15 minutes by re-running the
# indexer against Notion wiki, edgecity.live, and the Substack newsletter.
# Auto-commits any changes back to this repo (Edge-City/edgeclaw-skills),
# which then propagates through nested subtrees to Edge-City/edgeclaw and
# downstream consumers.
#
# Inert when this file lives inside a parent subtree mount (it only
# triggers from the repo-root .github/, not nested .github/ folders).
name: Index Reference Content

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: edge-esmeralda
        run: bun install --frozen-lockfile

      - name: Run indexer
        working-directory: edge-esmeralda
        run: bun run scripts/index.ts

      - name: Commit updated references
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add edge-esmeralda/references/
          git diff --cached --quiet || git commit -m "Update reference content [automated]"
          git push
